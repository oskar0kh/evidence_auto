server.port=8080
spring.application.name=evidence-auto-backend

# Chrome 실행 파일 경로 (비우면 자동 탐지, WSL에서는 google-chrome-stable 권장)
# sudo 권한 없이 backend/.chrome 아래에 로컬 설치된 Google Chrome을 사용
evidence.chrome.binary=/home/kunhyung/daeryun/evidence_auto/backend/.chrome/opt/google/chrome/chrome

# 댓글 영역 로딩 대기(ms). 0이면 대기하지 않음
evidence.screenshot.comment-wait-ms=1500

# NONE 전략 사용 시 page load 타임아웃(초). 본문 대기는 content-wait-seconds 사용
evidence.screenshot.page-load-timeout-seconds=15
evidence.screenshot.content-wait-seconds=45

# 광고/트래킹 도메인 차단 (Chrome CDP, 캡처 로딩 가속)
evidence.screenshot.block-tracking=true
