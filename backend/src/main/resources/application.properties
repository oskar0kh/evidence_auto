server.port=8080
spring.application.name=evidence-auto-backend

# Chrome 실행 파일 경로 (비우면 자동 탐지, WSL에서는 google-chrome-stable 권장)
evidence.chrome.binary=

# 댓글 영역 로딩 대기(ms). 0이면 대기하지 않음
evidence.screenshot.comment-wait-ms=1500

# NONE 전략 사용 시 page load 타임아웃(초). 본문 대기는 content-wait-seconds 사용
evidence.screenshot.page-load-timeout-seconds=15
evidence.screenshot.content-wait-seconds=45
evidence.screenshot.driver-start-timeout-seconds=30
evidence.screenshot.driver-start-max-attempts=3
evidence.screenshot.driver-recovery-delay-ms=2000

# 광고/트래킹 도메인 차단 (Chrome CDP, 캡처 로딩 가속)
evidence.screenshot.block-tracking=true

# 스크린샷 재시도 전 대기(ms)
evidence.screenshot.retry-delay-ms=1000

# 크롤 요청 간격 및 재시도
evidence.crawl.fast-mode-delay-threshold=1000
evidence.crawl.fast-mode-delay-after-threshold-min-ms=500
evidence.crawl.fast-mode-delay-after-threshold-max-ms=1000
evidence.crawl.protective-request-delay-min-ms=3000
evidence.crawl.protective-request-delay-max-ms=8000
evidence.crawl.retry-max-attempts=3
evidence.crawl.retry-backoff-base-ms=1000
evidence.crawl.comment-page-delay-ms=300
evidence.crawl.url-retry-max-attempts=2
evidence.crawl.url-protective-retry-max-attempts=2
evidence.crawl.protective-successes-to-release=5
evidence.crawl.url-max-duration-ms=180000
evidence.crawl.chrome-session-rotate-every-urls=25
evidence.crawl.search-page-retry-max-attempts=2
evidence.crawl.connection-failure-threshold=3
evidence.crawl.connection-cooldown-min-ms=30000
evidence.crawl.connection-cooldown-max-ms=60000

# Insane-search 스타일 에스컬레이션
evidence.crawl.escalation.enabled=true
evidence.crawl.escalation.consecutive-fail-threshold=3
evidence.crawl.escalation.prefer-browser-after-threshold=true

# Instagram 크롤링 (HTML 파싱 + GraphQL + 댓글 페이지네이션)
# 댓글 전체 수집: UI의 "인스타 로그인" 또는 POST /api/crawl/instagram/session/login
# 으로 Chrome에서 로그인하면 쿠키 파일에 자동 저장됩니다.
# 수동 주입도 가능:
#   evidence.instagram.session-cookies=sessionid=...;csrftoken=...;ds_user_id=...
evidence.instagram.session-cookies=
evidence.instagram.session-cookies-file=./.instagram-session-cookies.txt
evidence.instagram.login.profile-dir=./.instagram-chrome-profile
evidence.instagram.login.timeout-seconds=300
evidence.instagram.login.poll-interval-ms=1500
evidence.instagram.x-ig-app-id=936619743392459
evidence.instagram.doc-id.post=27128499623469141
evidence.instagram.doc-id.comments-container=26297736713236852
evidence.instagram.doc-id.comments=26248690958161038
evidence.instagram.doc-id.child-comments=26914912424764761
evidence.instagram.comments.paginate=true
evidence.instagram.comments.api-v1=true
evidence.instagram.comments.max-pages=30
evidence.instagram.comments.max-child-pages=10
evidence.instagram.comments.delay-ms=400
evidence.instagram.screenshot.enabled=true
